name: Build Ionic App and Deploy on FTP

on: [push]

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master 
        
      # - name: Install Angular
      #   run: npm install -g @angular/cli@latest

      - name: Install Ionic
        run: npm install -g @ionic/cli
        
      - name: Install Dependencies
        run: npm install

      # - name: Install Cordova
      #   run: npm install -g cordova 

      # - name: Add Angular Cordova builders
      #   run: ng add @ionic/cordova-builders '--skip-confirmation'

      # - name: Enable cordova
      #   run: ionic integrations enable cordova
      - name: Build Ionic App
        run: ng build

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Assets to Android
        run: npx cap copy android

      - name: Build APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/vacadmin.apk

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/vacadmin.apk
        
        
