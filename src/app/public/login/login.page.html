<ion-content class="login-content">

  <div class="login-wrapper">

    <!-- Logo/Brand -->
    <div class="login-brand">
      <div class="login-logo">
        <ion-icon name="medkit"></ion-icon>
      </div>
      <h1>VacAdmin</h1>
      <p>Vaccine Management System</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="login-subtitle">Sign in to your admin account</p>

      <form [formGroup]="fg">

        <div class="input-group">
          <label>Mobile Number</label>
          <div class="input-wrap">
            <ion-icon name="phone-portrait-outline" class="input-icon"></ion-icon>
            <ion-input type="email" formControlName="MobileNumber" placeholder="Enter mobile number"></ion-input>
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrap">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <ion-input type="password" formControlName="Password" placeholder="Enter password"></ion-input>
          </div>
        </div>

        <div class="forgot-link">
          <a (click)="forgotPasswordAlert()">Forgot password?</a>
        </div>

        <ion-button expand="block" class="login-btn" (click)="login()">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Sign In
        </ion-button>

      </form>
    </div>

    <p class="login-footer-note">Admin access only &bull; VacAdmin &copy; 2024</p>

  </div>

</ion-content>
