<ion-content class="page-content">
  <div class="cards-container">
    <ion-card class="doctor-card" *ngFor="let doc of doctors">
      <div class="doctor-card-header">
        <div class="doctor-avatar">
          {{ doc.DisplayName?.charAt(0)?.toUpperCase() || 'D' }}
        </div>
        <div class="doctor-info">
          <h3>{{doc.DisplayName}}</h3>
          <span class="doctor-pmdc">PMDC: {{doc.PMDC}}</span>
        </div>
        <ion-button fill="clear" color="danger" size="small" (click)="alertforDeleteDoctor(doc.Id)" class="icon-btn">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </div>

      <div class="doctor-details">
        <div class="detail-row">
          <ion-icon name="mail-outline"></ion-icon>
          <span>{{doc.Email}}</span>
        </div>
        <div class="detail-row">
          <ion-icon name="call-outline"></ion-icon>
          <span>{{doc.User.MobileNumber}}</span>
        </div>
        <div class="detail-row expiry-row" [class.expired]="doc.ValidUpto < today">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>Validity: </span>
          <ion-datetime
            min="2015"
            max="2030"
            size="small"
            display-format="MMM YYYY"
            picker-format="DD MMM YYYY"
            value="{{doc.ValidUpto}}"
            (ionChange)="updateValidity($event, doc.Id)"
          ></ion-datetime>
        </div>
      </div>

      <div class="doctor-card-footer">
        <ion-button size="small" fill="outline" color="primary" routerLink="/members/doctor/{{doc.Id}}/permissions" class="footer-btn">
          <ion-icon slot="start" name="finger-print"></ion-icon>
          Permissions
        </ion-button>
        <ion-button size="small" fill="outline" color="medium" disabled="true" class="footer-btn">
          <ion-icon slot="start" name="people-outline"></ion-icon>
          Patients
        </ion-button>
      </div>
    </ion-card>
  </div>

  <div class="empty-state" *ngIf="doctors && doctors.length === 0">
    <ion-icon name="person-circle-outline"></ion-icon>
    <h3>No approved doctors</h3>
    <p>Approved doctors will appear here</p>
  </div>
</ion-content>
