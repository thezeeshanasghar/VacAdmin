<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Suggest Brands</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-content>
      <h2>Vaccine: {{ vaccineName || ('ID ' + vaccineId) }}</h2>
      <p>Select all suggested brands and submit once.</p>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-item *ngFor="let brand of brands">
      <ion-label>{{ brand.Name }}</ion-label>
      <ion-checkbox slot="end" [(ngModel)]="brand.Selected"></ion-checkbox>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="primary" (click)="submit()">Submit</ion-button>
</ion-content>
