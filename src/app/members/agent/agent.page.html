<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Agents</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let agent of agents">
      <ion-label>
        <h2>{{ agent.Name }}</h2>
        <p *ngIf="agent.PhoneNumber">{{ agent.PhoneNumber }}</p>
        <p>Fee: Rs. {{ agent.ReferralFeePerClient }} / client</p>
      </ion-label>
      <ion-button slot="end" fill="clear" color="primary" (click)="editAgent(agent)">
        <ion-icon name="create-outline"></ion-icon>
      </ion-button>
      <ion-button slot="end" fill="clear" color="danger" (click)="deleteAgent(agent)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addAgent()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
