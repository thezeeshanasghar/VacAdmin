<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Vaccine Brands</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/members/vaccineBrands/add" fill="solid" color="light" class="add-btn">
        <ion-icon slot="start" name="add-outline"></ion-icon>
        Add
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">

  <div class="empty-state" *ngIf="data && data.length === 0">
    <ion-icon name="flask-outline"></ion-icon>
    <h3>No vaccine brands found</h3>
    <p>Server returned an empty response</p>
  </div>

  <div class="section-header" *ngIf="data && data.length > 0">
    <h2>All Brands</h2>
    <div class="section-line"></div>
    <ion-badge color="primary" class="count-badge">{{data.length}}</ion-badge>
  </div>

  <div class="table-container" *ngIf="data && data.length > 0">
    <table>
      <thead>
        <tr>
          <th>Vaccine</th>
          <th>Brand</th>
          <th style="text-align:center">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of data">
          <td>
            <div class="cell-with-icon">
              <div class="cell-dot teal"></div>
              {{ item.VaccineName }}
            </div>
          </td>
          <td>
            <div class="cell-with-icon">
              <div class="cell-dot blue"></div>
              {{ item.BrandName }}
            </div>
          </td>
          <td style="text-align:center">
            <ion-button color="danger" fill="clear" size="small" (click)="deleteAssociation(item)" class="delete-btn">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</ion-content>
